steps:
  # Step 1: Build the image from pre-built local assets
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/struct-ai-frontend'
      - '-f'
      - 'deployment/Dockerfile.static'
      - '.'

  # Step 2: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/struct-ai-frontend'

images:
  - 'gcr.io/$PROJECT_ID/struct-ai-frontend'
