steps:
  # Step 1: Build the React frontend with the backend URL as a build arg
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/struct-ai-frontend'
      - '--build-arg'
      - 'REACT_APP_API_BASE_URL=$_REACT_APP_API_BASE_URL'
      - '-f'
      - 'deployment/Dockerfile.frontend'
      - '.'

  # Step 2: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/struct-ai-frontend'

images:
  - 'gcr.io/$PROJECT_ID/struct-ai-frontend'

substitutions:
  _REACT_APP_API_BASE_URL: 'http://localhost:8000'
